version: "3.8"

services:
  relay:
    build:
      context: .
      dockerfile: relay/Dockerfile
    ports:
      - "7780:7780"
    environment:
      - PA_RELAY_KEY=${PA_RELAY_KEY:-change-this-to-your-secret-key}
      - PA_RELAY_PORT=7780
      - PA_RELAY_HOST=0.0.0.0
      - PA_TOKEN_TTL_SEC=86400
      - PA_HEARTBEAT_TIMEOUT_SEC=90
      - PA_HEARTBEAT_CHECK_INTERVAL_SEC=30
      - PA_PAIR_CODE_TTL_SEC=300
      - PA_MAX_SESSIONS=10
      - PA_ENABLE_CORS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7780/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
